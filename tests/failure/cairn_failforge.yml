# FailForge test configuration for Cairn PaaS
name: cairn-reliability-test
seed: 42

time:
  duration_ms: 15000
  tick_ms: 10

system:
  type: process_cluster
  nodes:
    count: 2
    # Prefer relative bootstrap from Cairn repo (or set CAIRN_ROOT / absolute path when launching FailForge)
    command: "tests/failure/failforge_bootstrap.sh {node_id} {port} .failforge/data/{run_id}/{node_id}"
    ports:
      start: 2476
    data_dir: ".failforge/data/{run_id}/{node_id}"

network:
  mode: controlled_proxy
  proxy_port: 9000

workload:
  type: cairn
  clients: 2
  duration_ms: 10000
  keys: [x]
  operations:
    deploy:
      weight: 5
    status:
      weight: 5
    backup:
      weight: 3
    restore:
      weight: 3
    rollback:
      weight: 2

faults:
  mode: seeded_random
  profile:
    max_faults: 3
    kill_node:
      weight: 1
    restart_node:
      weight: 1
    partition:
      weight: 1

checkers:
  - name: failed_deploy_protection
  - name: no_lost_active_volume

output:
  dir: "runs/cairn-{seed}"
