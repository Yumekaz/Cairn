name: smoke

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Unit tests (core packages)
        run: |
          go test ./internal/deploymeta/ ./internal/config/ ./internal/preflight/ ./internal/store/ ./internal/daemon/ -count=1
      - name: Build binaries
        run: |
          go build -o bin/cairn ./cmd/cairn
          go build -o bin/cairnd ./cmd/cairnd
      - name: Demo script dry syntax check
        run: |
          for s in scripts/*.sh; do bash -n "$s"; done
      - name: Note on full reliability gate
        run: |
          echo "Full stability_gate.sh / failure_matrix.sh require Linux + Mini-Docker root and are not run on GitHub-hosted runners."
