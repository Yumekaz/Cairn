name: counter-api
kind: web
image: /home/yumekaz/Desktop/Mini-Docker/rootfs
command: ["/bin/busybox", "httpd", "-f", "-p", "80", "-h", "/www"]
ports:
  - host: 8080
    container: 80
volumes:
  - name: counter-data
    mount_path: /www
healthcheck:
  http_path: /index.html
  interval: 2s
  timeout: 1s
  retries: 3
  startup_grace: 1s
restart:
  policy: on-failure
  max_retries: 3
